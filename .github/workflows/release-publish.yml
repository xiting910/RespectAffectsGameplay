# =============================================================================
# Release 发布工作流: 推送 tag 时自动构建、测试、发布到 GitHub Release
# =============================================================================
name: Release Publish

# 触发条件: 当推送以 v 开头的 tag 时执行
on:
  push:
    tags:
      - "v*"

# 权限: 需要写入 contents 才能创建 Release 并上传产物
permissions:
  contents: write

# 作业定义: 包含构建、测试、发布步骤
jobs:
  release:
    # TODO: 根据项目需求选择合适的运行环境
    runs-on: ubuntu-latest

    # TODO: 根据项目需求调整步骤
