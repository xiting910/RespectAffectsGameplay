# =============================================================================
# Release 工作流: 推送 v* 标签时自动构建、创建 GitHub Release、更新 Steam 创意工坊
# =============================================================================
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

env:
  MOD_ID: "RespectAffectsGameplay"
  STS2_APP_ID: "2868840"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION (tag: $TAG_NAME)"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.slnx

      - name: Build stubs
        run: |
          dotnet build stubs/sts2/sts2.csproj --configuration Release
          dotnet build stubs/0Harmony/0Harmony.csproj --configuration Release
          mkdir -p stubs/data_sts2_linuxbsd_x86_64
          cp stubs/sts2/bin/Release/net9.0/sts2.dll stubs/data_sts2_linuxbsd_x86_64/
          cp stubs/0Harmony/bin/Release/net9.0/0Harmony.dll stubs/data_sts2_linuxbsd_x86_64/

      - name: Update version in mod JSON
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
          Scripts/${{ env.MOD_ID }}.json > Scripts/${{ env.MOD_ID }}.json.tmp
          mv Scripts/${{ env.MOD_ID }}.json.tmp Scripts/${{ env.MOD_ID }}.json
          echo "✅ JSON updated:"
          cat Scripts/${{ env.MOD_ID }}.json

      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Package mod
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p workshop/content
          cp Scripts/bin/Release/net9.0/${{ env.MOD_ID }}.dll workshop/content/
          cp Scripts/${{ env.MOD_ID }}.json workshop/content/
          echo "✅ Copied build output to workshop/content/"

          PKG="pkg/${{ env.MOD_ID }}"
          mkdir -p "$PKG"
          cp Scripts/bin/Release/net9.0/${{ env.MOD_ID }}.dll "$PKG/"
          cp Scripts/${{ env.MOD_ID }}.json "$PKG/"
          cd pkg
          zip -r "../${{ env.MOD_ID }}_v${VERSION}.zip" "${{ env.MOD_ID }}"
          cd ..
          echo "📦 ${{ env.MOD_ID }}_v${VERSION}.zip ($(du -h ${{ env.MOD_ID }}_v${VERSION}.zip | cut -f1))"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mod-package
          path: |
            ${{ env.MOD_ID }}_v*.zip
            pkg/${{ env.MOD_ID }}/
            workshop/
          retention-days: 1

  github-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: mod-package

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          CHANGELOG=$(awk -v ver="$VERSION" '
          BEGIN { found=0; output="" }
          $0 ~ "^## \\[" ver "\\]" { found=1; next }
          found && $0 ~ "^## \\[" { exit }
          found { output = output $0 "\n" }
          END { print output }
          ' CHANGELOG.md)

          if [ -z "$(echo "$CHANGELOG" | tr -d '[:space:]')" ]; then
          echo "⚠️  No changelog for v$VERSION, using [Unreleased]"
          CHANGELOG=$(awk '
            BEGIN { found=0; output="" }
            $0 ~ "^## \\[Unreleased\\]" { found=1; next }
            found && $0 ~ "^## \\[" { exit }
            found { output = output $0 "\n" }
            END { print output }
          ' CHANGELOG.md)
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate commit history & contributors
        id: gitinfo
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "${{ needs.build.outputs.tag }}" | head -1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            echo "📌 Previous tag: $PREV_TAG"
          else
            RANGE="HEAD"
            echo "📌 No previous tag — first release"
          fi

          # Commit history (exclude merge commits)
          COMMITS=$(git log --oneline --no-merges $RANGE | sed 's/^/- /')
          if [ -z "$COMMITS" ]; then
            COMMITS="_（无新提交）_"
          fi
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Contributors (unique authors)
          CONTRIBS=$(git log --format='- @%an' $RANGE | sort -u)
          if [ -z "$CONTRIBS" ]; then
            CONTRIBS="_（无贡献者）_"
          fi
          {
            echo "contributors<<EOF"
            echo "$CONTRIBS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "✅ Commits:"
          echo "$COMMITS"
          echo "✅ Contributors:"
          echo "$CONTRIBS"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ needs.build.outputs.version }} — Respect Affects Gameplay"
          tag_name: ${{ needs.build.outputs.tag }}
          body: |
            ## 🔧 Respect Affects Gameplay v${{ needs.build.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ### 📝 此版本提交

            ${{ steps.gitinfo.outputs.commits }}

            ---

            ### 🔗 链接

            - [问题反馈](https://github.com/${{ github.repository }}/issues)
            - [完整更新日志](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

            <details>
            <summary>Contributors</summary>

            ${{ steps.gitinfo.outputs.contributors }}

            </details>
          files: |
            ${{ env.MOD_ID }}_v${{ needs.build.outputs.version }}.zip
          draft: false
          prerelease: false
          make_latest: true

  workshop:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: mod-package

      - name: Check if workshop upload is configured
        id: check
        run: |
          if [ -f "workshop/mod_id.txt" ] && [ -f "workshop/workshop.json" ] && [ -d "workshop/content" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "✅ workshop/ 已配置，将上传到创意工坊"
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "⏭️  workshop/ 未完成配置（缺少 mod_id.txt / workshop.json / content/），跳过上传"
          fi

      - name: Read workshop metadata
        if: steps.check.outputs.enabled == 'true'
        id: ws_meta
        run: |
          echo "title=$(jq -r '.title' workshop/workshop.json)" >> $GITHUB_OUTPUT
          # description 含多行文本（含 GitHub URL 等），必须用 heredoc 写入 $GITHUB_OUTPUT
          {
            echo "description<<EOF"
            jq -r '.description' workshop/workshop.json
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "visibility=$(jq -r '.visibility' workshop/workshop.json)" >> $GITHUB_OUTPUT

          # Dependencies: JSON array of workshop item IDs → bash array
          DEPS_JSON=$(jq -r '.dependencies // [] | join(" ")' workshop/workshop.json)
          echo "deps=$DEPS_JSON" >> $GITHUB_OUTPUT
          echo "📋 Workshop title: $(jq -r '.title' workshop/workshop.json)"
          echo "🔗 Dependencies: $DEPS_JSON"

          if [ -f "workshop/mod_id.txt" ]; then
            ITEM_ID=$(cat workshop/mod_id.txt | tr -d '[:space:]')
            echo "item_id=$ITEM_ID" >> $GITHUB_OUTPUT
            echo "🆔 Workshop item ID: $ITEM_ID"
          else
            echo "❌ workshop/mod_id.txt not found!"
            exit 1
          fi

          if [ -f "workshop/image.png" ]; then
            echo "has_preview=true" >> $GITHUB_OUTPUT
            echo "✅ Workshop preview image found"
          else
            echo "has_preview=false" >> $GITHUB_OUTPUT
            echo "⚠️  No workshop/image.png — Workshop item will lack a preview"
          fi

      - name: Extract changenote from CHANGELOG
        if: steps.check.outputs.enabled == 'true'
        id: changenote
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          RAW=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && $0 ~ "^## \\["   { exit }
            found && $0 !~ "^$" && $0 !~ "^### " {
              gsub(/^[[:space:]]*[-*][[:space:]]*/, "", $0)
              print; exit
            }
          ' CHANGELOG.md | tr -d '\n' | sed 's/  */ /g' | cut -c1-200)

          if [ -n "$RAW" ]; then
            CHANGENOTE="v${VERSION}: ${RAW}"
          else
            CHANGENOTE="v${VERSION} — See GitHub Release for details"
          fi
          echo "changenote=$CHANGENOTE" >> $GITHUB_OUTPUT
          echo "📝 Changenote: $CHANGENOTE"

      - name: Generate workshop VDF
        if: steps.check.outputs.enabled == 'true'
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          WS_CONTENT="${{ github.workspace }}/workshop/content"
          ITEM_ID="${{ steps.ws_meta.outputs.item_id }}"
          CHANGENOTE="${{ steps.changenote.outputs.changenote }}"
          HAS_PREVIEW="${{ steps.ws_meta.outputs.has_preview }}"
          TITLE="${{ steps.ws_meta.outputs.title }}"
          DESCRIPTION="${{ steps.ws_meta.outputs.description }}"
          VISIBILITY="${{ steps.ws_meta.outputs.visibility }}"
          DEPS="${{ steps.ws_meta.outputs.deps }}"

          case "$VISIBILITY" in
            public)       VIS_NUM=0 ;;
            private)      VIS_NUM=1 ;;
            friends_only) VIS_NUM=2 ;;
            unlisted)     VIS_NUM=3 ;;
            *)            VIS_NUM=0 ;;
          esac

          VDF_FILE="${{ github.workspace }}/workshop.vdf"

          # Flatten description: replace newlines with spaces to keep VDF single-line-safe
          DESCRIPTION_FLAT=$(echo "$DESCRIPTION" | tr '\n' ' ' | sed 's/  */ /g')

          {
            echo '"workshopitem"'
            echo '{'
            echo "\"appid\"             \"2868840\""
            echo "\"publishedfileid\"   \"$ITEM_ID\""
            echo "\"contentfolder\"     \"$WS_CONTENT\""
            if [ "$HAS_PREVIEW" = "true" ]; then
              echo "\"previewfile\"       \"${{ github.workspace }}/workshop/image.png\""
            fi
            echo "\"visibility\"        \"$VIS_NUM\""
            echo "\"title\"             \"$TITLE\""
            echo "\"description\"       \"$DESCRIPTION_FLAT\""
            echo "\"changenote\"        \"$CHANGENOTE\""
            if [ -n "$DEPS" ]; then
              echo '"dependencies"'
              echo '{'
              i=0
              for dep in $DEPS; do
                echo "    \"$i\"        \"$dep\""
                i=$((i + 1))
              done
              echo '}'
            fi
            echo '}'
          } > "$VDF_FILE"

          echo "📝 Generated workshop.vdf:"
          cat "$VDF_FILE"

      - name: Upload to Steam Workshop
        if: steps.check.outputs.enabled == 'true'
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_CONFIG_B64: ${{ secrets.STEAM_CONFIG_B64 }}
        run: |
          STEAMCMD_DIR="${{ github.workspace }}/steamcmd"
          mkdir -p "$STEAMCMD_DIR"

          if [ ! -f "$STEAMCMD_DIR/steamcmd.sh" ]; then
            echo "📥 Downloading steamcmd..."
            curl -sSL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" \
              | tar -xz -C "$STEAMCMD_DIR"
          else
            echo "✅ steamcmd already present, skipping download"
          fi

          if [ -n "$STEAM_CONFIG_B64" ]; then
            echo "🔐 Restoring cached Steam login session from STEAM_CONFIG_B64..."
            mkdir -p "$HOME/Steam"
            echo "$STEAM_CONFIG_B64" | base64 -d | tar -xz -C "$HOME/Steam"
            echo "✅ config.vdf restored — steamcmd will use cached credentials"

            if [ -f "$HOME/Steam/config/config.vdf" ]; then
              echo "✅ Verified: ~/Steam/config/config.vdf exists"
            else
              echo "❌ config.vdf not found at ~/Steam/config/config.vdf after extraction!"
              echo "   Listing extracted files for debugging:"
              find "$HOME/Steam" -name "config.vdf" 2>/dev/null || echo "   (none found)"
              echo "💡 Your STEAM_CONFIG_B64 tar should contain: config/config.vdf"
              echo "   Generate it with:  tar -czf - -C ~/Steam config/config.vdf | base64 -w0"
              exit 1
            fi


          else
            echo "❌ STEAM_CONFIG_B64 not set!"
            echo "💡 Run WSL setup first, then add the secret:"
            echo "   https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          echo "🚀 Uploading to Steam Workshop (item ${{ steps.ws_meta.outputs.item_id }})..."
          cd "$STEAMCMD_DIR"
          ./steamcmd.sh \
            +login "$STEAM_USERNAME" \
            +workshop_build_item "${{ github.workspace }}/workshop.vdf" \
            +quit

          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Workshop upload completed successfully!"
          else
            echo "❌ Workshop upload failed (exit code: $EXIT_CODE)"
            echo "💡 Troubleshooting:"
            echo "   1. Cached credentials may have expired — regenerate STEAM_CONFIG_B64 in WSL"
            echo "   2. Check that STEAM_USERNAME secret is correct"
            echo "   3. See https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit $EXIT_CODE
          fi
