# =============================================================================
# CI 工作流: 每次 push / PR 时自动还原依赖并编译（Mod 项目，无测试）
# =============================================================================
name: CI

# 触发条件: 当向 main 分支 push 或发起 PR 时执行
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 权限设置: CI 需要读取代码库内容
permissions:
  contents: read

# 作业定义: 还原 NuGet 包并编译项目
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v7

      # 2. 安装 .NET 9 SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      # 3. 创建游戏引用的 DLL 以便编译
      - name: Create stub game references
        run: |
          mkdir -p ./stubs/data_sts2_linuxbsd_x86_64
          touch ./stubs/data_sts2_linuxbsd_x86_64/sts2.dll
          touch ./stubs/data_sts2_linuxbsd_x86_64/0Harmony.dll

      # 4. 还原 NuGet 依赖包
      - name: Restore NuGet packages
        run: dotnet restore

      # 5. 编译项目
      - name: Build solution (Release)
        run: dotnet build --no-restore --configuration Release
