# =============================================================================
# CI 工作流: 每次 push / PR 时自动还原依赖并编译（Mod 项目，无测试）
# =============================================================================
name: CI

# 触发条件: 当向 main 分支 push 或发起 PR 时执行 (标签推送由 release.yml 单独处理)
on:
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

# 权限设置: CI 需要读取代码库内容
permissions:
  contents: read

# 作业定义: 还原 NuGet 包并编译项目
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v7

      # 2. 安装 .NET 9 SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      # 3. 编译桩项目以生成游戏引用的 DLL
      - name: Build sts2 stub
        run: dotnet build stubs/sts2/sts2.csproj --configuration Release

      - name: Build 0Harmony stub
        run: dotnet build stubs/0Harmony/0Harmony.csproj --configuration Release

      # 4. 将桩 DLL 复制到游戏引用期望的路径
      - name: Copy stub DLLs to expected location
        run: |
          mkdir -p stubs/data_sts2_linuxbsd_x86_64
          cp stubs/sts2/bin/Release/net9.0/sts2.dll stubs/data_sts2_linuxbsd_x86_64/
          cp stubs/0Harmony/bin/Release/net9.0/0Harmony.dll stubs/data_sts2_linuxbsd_x86_64/

      # 5. 还原 NuGet 依赖包
      - name: Restore NuGet packages
        run: dotnet restore

      # 6. 编译项目
      - name: Build solution (Release)
        run: dotnet build --no-restore --configuration Release
