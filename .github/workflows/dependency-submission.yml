# =============================================================================
# 依赖提交工作流: 向 GitHub 提交项目依赖快照, 供 Dependency Review 使用
# =============================================================================
name: Dependency Submission

# 触发条件: 向 main/develop 分支 push 或发起 PR 时执行
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 权限设置: 需要 id-token 和写入权限以上传依赖快照
permissions:
  id-token: write
  contents: write

# 作业定义: 扫描依赖并提交快照
jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v7

      # 2. 安装 .NET 9 SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      # 3. 扫描 NuGet 依赖并提交快照到 GitHub 依赖图
      - name: Submit dependency snapshot
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.4
        with:
          detectorsCategories: NuGet
